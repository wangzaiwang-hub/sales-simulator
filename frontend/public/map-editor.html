<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ 地图编辑器 - 支持Y轴排序和碰撞编辑</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 10px;
            overflow: hidden;
        }
        h1 { text-align: center; margin-bottom: 5px; font-size: 20px; }
        .container {
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 10px;
            max-width: 100vw;
            margin: 0 auto;
            height: calc(100vh - 80px);
        }
        .panel {
            background: #2a2a2a;
            border-radius: 6px;
            padding: 10px;
            overflow-y: auto;
            font-size: 12px;
        }
        .panel h3 {
            margin: 10px 0 8px 0;
            color: #4CAF50;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 6px;
            margin: 3px 0;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }
        button:hover { background: #45a049; }
        button:active { transform: scale(0.98); }
        select, input {
            width: 100%;
            padding: 5px;
            margin: 3px 0;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 3px;
            font-size: 11px;
        }
        .canvas-container {
            background: #000;
            border-radius: 6px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            overflow: auto;
            width: 100%;
            position: relative;
        }
        canvas {
            border: 2px solid #4CAF50;
            image-rendering: pixelated;
            cursor: crosshair;
            display: block;
            box-sizing: content-box;
        }
        .sprite-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 6px;
            margin-top: 8px;
        }
        .sprite-item {
            background: #333;
            border: 2px solid #555;
            border-radius: 3px;
            padding: 3px;
            cursor: pointer;
            text-align: center;
        }
        .sprite-item:hover { border-color: #4CAF50; }
        .sprite-item.selected { border-color: #4CAF50; background: #3a3a3a; }
        .sprite-item canvas {
            width: 100%;
            height: 50px;
            object-fit: contain;
            border: none;
            image-rendering: pixelated;
        }
        .info {
            background: #333;
            padding: 6px;
            border-radius: 3px;
            font-size: 10px;
            margin: 6px 0;
            color: #aaa;
        }
        .tool-btn {
            display: inline-block;
            width: auto;
            padding: 5px 8px;
            margin: 3px 3px 3px 0;
            font-size: 10px;
        }
        .tool-btn.active { background: #2196F3; }
        label { display: block; margin: 8px 0 4px 0; font-size: 11px; }
        .layer-item {
            background: #333;
            padding: 6px;
            margin: 4px 0;
            border-radius: 3px;
            cursor: move;
            border: 2px solid #555;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
        }
        .layer-item.active { border-color: #4CAF50; background: #3a3a3a; }
        .layer-item:hover { background: #3a3a3a; }
        .layer-controls {
            display: flex;
            gap: 3px;
        }
        .layer-controls button {
            width: auto;
            padding: 3px 6px;
            margin: 0;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <h1>🗺️ 地图编辑器</h1>
    <p style="text-align:center; color:#999; margin-bottom:10px; font-size:11px;">支持Y轴深度排序、碰撞区域编辑、图层管理</p>
    
    <div class="container">
        <!-- 左侧：素材库 -->
        <div class="panel">
            <h3>📦 素材库</h3>
            <select id="spriteSource" onchange="loadSprites()">
                <option value="">选择素材集</option>
                <optgroup label="城市瓦片">
                    <option value="urbanB">城市建筑 (UrbanB)</option>
                    <option value="urbanA2">城市地面 (Urban_A2)</option>
                    <option value="urbanA5">城市装饰 (Urban_A5)</option>
                    <option value="urbanCity">城市瓦片集</option>
                </optgroup>
                <optgroup label="家具动画">
                    <option value="bed">床动画 (BD001)</option>
                    <option value="lamp">灯动画 (BL001)</option>
                    <option value="shelf">架子动画 (SL001)</option>
                </optgroup>
                <optgroup label="家具素材">
                    <option value="woodenFurniture">木质家具</option>
                    <option value="deskEssentials">办公桌物品</option>
                </optgroup>
            </select>
            
            <div class="info">
                💡 选择素材集后会自动加载所有素材
            </div>
            
            <div id="spriteGrid" class="sprite-grid"></div>
        </div>
        
        <!-- 中间：画布 -->
        <div class="canvas-container">
            <div style="margin-bottom: 10px;">
                <button class="tool-btn active" id="tool-select" onclick="setTool('select')">👆 画笔 (B)</button>
                <button class="tool-btn" id="tool-delete" onclick="setTool('delete')">🗑️ 橡皮 (E)</button>
                <button class="tool-btn" id="tool-fill" onclick="setTool('fill')">🪣 填充 (F)</button>
                <button class="tool-btn" id="tool-collision" onclick="setTool('collision')">⬜ 碰撞 (P)</button>
                <label style="display: inline-flex; align-items: center; margin-left: 15px; cursor: pointer;">
                    <input type="checkbox" id="showCollisionCheckbox" onchange="toggleCollisionBoxes()" style="width: auto; margin-right: 5px; cursor: pointer;">
                    <span style="font-size: 12px;">显示碰撞框</span>
                </label>
            </div>
            <canvas id="mapCanvas" width="960" height="720"></canvas>
            <div class="info" style="margin-top: 8px; font-size: 10px;">
                <strong>当前工具：</strong><span id="toolInfo">画笔工具</span><br>
                <strong>提示：</strong>按住V键拖动可以平移画布查看其他区域
            </div>
        </div>
        
        <!-- 右侧：属性面板 -->
        <div class="panel">
            <h3>📚 图层管理</h3>
            <button onclick="addLayer()">➕ 新建图层</button>
            <div id="layerList" style="margin-top: 10px;"></div>
            
            <h3>⚙️ 地图设置</h3>
            <label>导入背景图：</label>
            <input type="file" id="bgImageInput" accept="image/*" onchange="loadBackgroundImage()" style="width: 100%; padding: 4px; font-size: 10px;">
            <div class="info" style="font-size: 9px;">
                💡 背景图会作为可编辑对象添加到最底层
            </div>
            
            <label style="margin-top: 10px;">地图尺寸（格子数）：</label>
            <input type="number" id="mapCols" value="20" placeholder="列数" min="10" max="200">
            <input type="number" id="mapRows" value="15" placeholder="行数" min="10" max="200">
            <button onclick="resizeMap()">应用尺寸</button>
            
            <label>网格大小（像素）：</label>
            <input type="number" id="gridSize" value="48" min="16" max="128" onchange="updateGridSize()">
            <label style="display: flex; align-items: center; margin-top: 10px;">
                <input type="checkbox" id="showGrid" checked onchange="toggleGrid()" style="width: auto; margin-right: 8px;">
                显示网格
            </label>
            
            <h3>🎨 选中对象</h3>
            <div id="objectProps">
                <div class="info">未选中任何对象</div>
            </div>
            
            <h3>💾 保存/加载</h3>
            <label>地图名称：</label>
            <input type="text" id="mapName" placeholder="输入地图名称" style="margin-bottom: 8px;">
            <button onclick="saveMapToCloud()">☁️ 保存到云端</button>
            <button onclick="loadMapFromCloud()">☁️ 从云端加载</button>
            <button onclick="setActiveMap()">✅ 设为激活地图</button>
            <button onclick="exportMap()">📋 导出JSON</button>
            <button onclick="importMap()">📥 导入JSON</button>
            <textarea id="mapData" style="width:100%; height:100px; margin-top:10px; background:#333; color:#fff; border:1px solid #555; border-radius:4px; padding:8px;" placeholder="JSON数据"></textarea>
        </div>
    </div>

    <script>
        // ========== API配置 ==========
        // 获取后端API URL
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3001'  // 本地开发
            : 'https://capable-energy-production-bf2e.up.railway.app';  // 生产环境
        
        console.log('Using API URL:', API_URL);
        
        // ========== 资源URL处理 ==========
        function getResourceUrl(relativePath) {
            // 在云端部署时，资源通过前端public目录提供
            // 在本地开发时，也使用相对路径
            return relativePath;
        }
        
        // ========== 核心数据结构 ==========
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        
        let sprites = []; // 检测到的素材列表
        let mapObjects = []; // 地图上的对象
        let selectedSprite = null; // 当前选中的素材模板
        let selectedObject = null; // 当前选中的地图对象
        let selectedObjects = []; // 多选的对象列表
        let currentTool = 'select';
        let spriteImage = null;
        let currentSpriteSetId = null; // 当前素材集ID
        let currentMapId = null; // 当前地图ID（用于更新现有地图）
        
        // 记住每个素材的自定义大小
        let spriteSizes = {}; // {spriteIndex: {width, height}}
        
        // 图层系统
        let layers = [
            {id: 0, name: '图层 0', visible: true, locked: false}
        ];
        let currentLayer = 0;
        
        // 背景图
        let backgroundImage = null;
        let backgroundImageData = null;
        
        // 交互状态
        let isDragging = false;
        let isResizing = false;
        let isDrawingCollision = false;
        let isPainting = false; // 画笔模式
        let isPanning = false; // 画布平移模式
        let isVKeyPressed = false; // V键是否按下
        let dragStart = {x: 0, y: 0};
        let resizeHandle = null;
        let collisionStart = null;
        
        // 独立碰撞区域列表
        let collisionAreas = [];
        
        // 画布偏移
        let canvasOffsetX = 0;
        let canvasOffsetY = 0;
        
        // 预览模式
        let isPreviewMode = false;
        let showCollisionBoxes = false; // 控制是否显示碰撞框
        
        // 测试角色
        let testCharacter = {
            x: 100,
            y: 100,
            width: 32,  // 进一步缩小角色尺寸
            height: 32, // 进一步缩小角色尺寸
            speed: 3,
            appearance: {
                character: 1,
                tops: 16,
                bottoms: 5,
                shoes: 2,
                hair: 12,
                eyes: 1
            },
            images: {
                walk: {
                    Front: {},
                    Back: {},
                    Left: {},
                    Right: {}
                }
            },
            frame: 0,
            frameTimer: 0,
            frameDelay: 8,
            direction: 'Front',
            moving: false
        };
        
        let characterKeys = {
            up: false,
            down: false,
            left: false,
            right: false
        };
        
        // 角色图层顺序
        const CHARACTER_LAYER_ORDER = ['character', 'shoes', 'bottoms', 'tops', 'hair', 'eyes'];
        const CHARACTER_BASE_PATH = '/32x32 Customizable Character Pack/Walk';
        
        const CHARACTER_LAYER_FILES = {
            character: 'Character_Walk',
            tops: 'Clothing_Tops_Walk',
            bottoms: 'Clothing_Bottoms_Walk',
            shoes: 'Clothing_Shoes_Walk',
            hair: 'Hair_Walk',
            eyes: 'Eyes_Walk'
        };
        
        const CHARACTER_LAYER_FOLDERS = {
            character: 'Character',
            tops: 'Clothing',
            bottoms: 'Clothing',
            shoes: 'Clothing',
            hair: 'Hair',
            eyes: 'Eyes'
        };
        
        // 预加载角色图片
        function preloadCharacterImages() {
            const directions = ['Front', 'Back', 'Left', 'Right'];
            
            console.log('开始预加载角色图片...');
            
            directions.forEach(direction => {
                CHARACTER_LAYER_ORDER.forEach(layer => {
                    const folder = CHARACTER_LAYER_FOLDERS[layer];
                    const file = CHARACTER_LAYER_FILES[layer];
                    
                    // 文件名不包含变体编号，所有变体在同一个文件的不同行
                    const path = `${CHARACTER_BASE_PATH}/${folder}/${file}_${direction}-Sheet.png`;
                    const fullUrl = getResourceUrl(path);
                    
                    console.log(`加载图层 ${layer} (${direction}): ${fullUrl}`);
                    
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    
                    img.onload = () => {
                        console.log(`✓ 成功加载: ${layer} ${direction}`);
                    };
                    
                    img.onerror = () => {
                        console.error(`✗ 加载失败: ${layer} ${direction} - ${fullUrl}`);
                    };
                    
                    img.src = fullUrl;
                    
                    if (!testCharacter.images.walk[direction][layer]) {
                        testCharacter.images.walk[direction][layer] = img;
                    }
                });
            });
        }
        
        // 网格设置
        let gridSize = 48;
        let showGrid = true;
        
        // ========== 工具切换 ==========
        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tool-${tool}`).classList.add('active');
            
            const toolNames = {
                'select': '画笔工具 (B) - 单击放置，拖动连续填充，双击选中对象可缩放',
                'delete': '橡皮擦工具 (E) - 点击删除对象',
                'fill': '填充工具 (F) - 点击填充整个区域',
                'collision': '碰撞框工具 (P) - 选中对象后拖动绘制碰撞框，或直接拖动创建独立碰撞区域（空气墙）'
            };
            document.getElementById('toolInfo').textContent = toolNames[tool];
            selectedObject = null;
            render();
        }
        
        // 快捷键
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            // 预览模式下的角色控制
            if (isPreviewMode) {
                switch(e.key) {
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        characterKeys.up = true;
                        testCharacter.direction = 'Back';
                        e.preventDefault();
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        characterKeys.down = true;
                        testCharacter.direction = 'Front';
                        e.preventDefault();
                        break;
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        characterKeys.left = true;
                        testCharacter.direction = 'Left';
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        characterKeys.right = true;
                        testCharacter.direction = 'Right';
                        e.preventDefault();
                        break;
                }
                return;
            }
            
            if (e.key.toLowerCase() === 'v') {
                isVKeyPressed = true;
                canvas.style.cursor = 'grab';
            }
            
            if (e.key.toLowerCase() === 'h') {
                togglePreviewMode();
            }
            
            switch(e.key.toLowerCase()) {
                case 'b':
                    setTool('select');
                    break;
                case 'e':
                    setTool('delete');
                    break;
                case 'f':
                    setTool('fill');
                    break;
                case 'p':
                    setTool('collision');
                    break;
                case 'r':
                    rotateSelectedObject();
                    break;
                case 'g':
                    if (e.shiftKey) {
                        ungroupSelectedObject();
                    } else {
                        groupSelectedObjects();
                    }
                    break;
                case 'u':
                    ungroupSelectedObject();
                    break;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'v') {
                isVKeyPressed = false;
                isPanning = false;
                canvas.style.cursor = 'crosshair';
            }
            
            // 预览模式下的角色控制
            if (isPreviewMode) {
                switch(e.key) {
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        characterKeys.up = false;
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        characterKeys.down = false;
                        break;
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        characterKeys.left = false;
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        characterKeys.right = false;
                        break;
                }
            }
        });
        
        // 预览模式切换
        function togglePreviewMode() {
            isPreviewMode = !isPreviewMode;
            
            if (isPreviewMode) {
                // 预加载角色图片
                preloadCharacterImages();
                
                // 重置角色位置到画布中心
                testCharacter.x = canvas.width / 2 - testCharacter.width / 2;
                testCharacter.y = canvas.height / 2 - testCharacter.height / 2;
                testCharacter.frame = 0;
                testCharacter.frameTimer = 0;
                testCharacter.moving = false;
                
                // 进入全屏
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) {
                    elem.msRequestFullscreen();
                }
                
                // 隐藏所有UI元素（但保留碰撞框复选框）
                document.querySelectorAll('.panel').forEach(el => el.style.display = 'none');
                document.querySelector('h1').style.display = 'none';
                document.querySelectorAll('p').forEach(el => el.style.display = 'none');
                document.querySelectorAll('.info').forEach(el => el.style.display = 'none');
                document.querySelectorAll('.tool-btn').forEach(el => el.style.display = 'none');
                // 保持碰撞框复选框可见
                const collisionCheckbox = document.getElementById('showCollisionCheckbox');
                if (collisionCheckbox && collisionCheckbox.parentElement) {
                    collisionCheckbox.parentElement.style.display = 'inline-flex';
                }
                
                // 画布容器全屏样式
                const container = document.querySelector('.canvas-container');
                container.style.position = 'fixed';
                container.style.top = '0';
                container.style.left = '0';
                container.style.width = '100vw';
                container.style.height = '100vh';
                container.style.background = '#000';
                container.style.padding = '0';
                container.style.zIndex = '9999';
                container.style.display = 'flex';
                container.style.justifyContent = 'center';
                container.style.alignItems = 'center';
                
                // 取消选中
                selectedObject = null;
                
                // 启动游戏循环
                startGameLoop();
            } else {
                // 退出全屏
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
                
                // 显示所有UI元素
                document.querySelectorAll('.panel').forEach(el => el.style.display = 'block');
                document.querySelector('h1').style.display = 'block';
                document.querySelectorAll('p').forEach(el => el.style.display = 'block');
                document.querySelectorAll('.info').forEach(el => el.style.display = 'block');
                document.querySelectorAll('.tool-btn').forEach(el => el.style.display = 'inline-block');
                
                // 恢复画布容器样式
                const container = document.querySelector('.canvas-container');
                container.style.position = 'relative';
                container.style.top = 'auto';
                container.style.left = 'auto';
                container.style.width = '100%';
                container.style.height = 'auto';
                container.style.background = '#000';
                container.style.padding = '10px';
                container.style.zIndex = 'auto';
                container.style.display = 'flex';
                container.style.justifyContent = 'flex-start';
                container.style.alignItems = 'flex-start';
                
                // 停止游戏循环
                stopGameLoop();
            }
            
            render();
        }
        
        // 监听全屏退出事件
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && isPreviewMode) {
                togglePreviewMode();
            }
        });
        document.addEventListener('webkitfullscreenchange', () => {
            if (!document.webkitFullscreenElement && isPreviewMode) {
                togglePreviewMode();
            }
        });
        
        // 组合选中的对象
        function groupSelectedObjects() {
            if (selectedObjects.length < 2) {
                // 静默失败，不显示弹窗
                return;
            }
            
            // 计算组合对象的边界框
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            selectedObjects.forEach(obj => {
                minX = Math.min(minX, obj.x);
                minY = Math.min(minY, obj.y);
                maxX = Math.max(maxX, obj.x + obj.width);
                maxY = Math.max(maxY, obj.y + obj.height);
            });
            
            // 创建组合对象
            const groupObj = {
                id: 'group-' + Date.now(),
                isGroup: true,
                layer: selectedObjects[0].layer,
                x: minX,
                y: minY,
                width: maxX - minX,
                height: maxY - minY,
                rotation: 0,
                collision: null,
                children: selectedObjects.map(obj => ({
                    ...obj,
                    // 保存相对于组的位置
                    relativeX: obj.x - minX,
                    relativeY: obj.y - minY
                }))
            };
            
            // 如果有碰撞框，合并碰撞框
            const collisions = selectedObjects.filter(obj => obj.collision);
            if (collisions.length > 0) {
                let cMinX = Infinity, cMinY = Infinity, cMaxX = -Infinity, cMaxY = -Infinity;
                collisions.forEach(obj => {
                    cMinX = Math.min(cMinX, obj.collision.x);
                    cMinY = Math.min(cMinY, obj.collision.y);
                    cMaxX = Math.max(cMaxX, obj.collision.x + obj.collision.width);
                    cMaxY = Math.max(cMaxY, obj.collision.y + obj.collision.height);
                });
                groupObj.collision = {
                    x: cMinX,
                    y: cMinY,
                    width: cMaxX - cMinX,
                    height: cMaxY - cMinY
                };
            }
            
            // 从地图中移除原对象
            selectedObjects.forEach(obj => {
                const index = mapObjects.indexOf(obj);
                if (index !== -1) {
                    mapObjects.splice(index, 1);
                }
            });
            
            // 添加组合对象
            mapObjects.push(groupObj);
            
            // 清空选择
            selectedObjects = [];
            selectedObject = groupObj;
            
            updateObjectProps();
            render();
        }
        
        // 解组选中的对象
        function ungroupSelectedObject() {
            if (!selectedObject || !selectedObject.isGroup) {
                // 静默失败，不显示弹窗
                return;
            }
            
            const groupObj = selectedObject;
            
            // 将子对象还原到地图中
            groupObj.children.forEach(child => {
                const restoredObj = {
                    ...child,
                    x: groupObj.x + child.relativeX,
                    y: groupObj.y + child.relativeY,
                    // 移除相对位置属性
                    relativeX: undefined,
                    relativeY: undefined
                };
                mapObjects.push(restoredObj);
            });
            
            // 从地图中移除组合对象
            const index = mapObjects.indexOf(groupObj);
            if (index !== -1) {
                mapObjects.splice(index, 1);
            }
            
            // 清空选择
            selectedObject = null;
            
            updateObjectProps();
            render();
        }
        
        // 旋转选中的对象
        function rotateSelectedObject() {
            if (selectedObject) {
                selectedObject.rotation = (selectedObject.rotation || 0) + 90;
                if (selectedObject.rotation >= 360) selectedObject.rotation = 0;
                
                // 记住这个素材的旋转角度
                if (!spriteSizes[selectedObject.spriteIndex]) {
                    spriteSizes[selectedObject.spriteIndex] = {
                        width: selectedObject.width,
                        height: selectedObject.height
                    };
                }
                spriteSizes[selectedObject.spriteIndex].rotation = selectedObject.rotation;
                
                updateObjectProps();
                render();
            } else if (selectedSprite !== null) {
                // 如果没有选中对象，旋转当前素材模板
                const sprite = sprites[selectedSprite];
                if (!spriteSizes[selectedSprite]) {
                    spriteSizes[selectedSprite] = {
                        width: sprite.width,
                        height: sprite.height,
                        rotation: 0
                    };
                }
                spriteSizes[selectedSprite].rotation = (spriteSizes[selectedSprite].rotation || 0) + 90;
                if (spriteSizes[selectedSprite].rotation >= 360) {
                    spriteSizes[selectedSprite].rotation = 0;
                }
                // 移除了alert弹窗
            }
        }

        function loadBackgroundImage() {
            const input = document.getElementById('bgImageInput');
            const file = input.files[0];
            
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    console.log('背景图加载成功:', img.width, 'x', img.height);
                    
                    // 计算适配画布的尺寸
                    let width = img.width;
                    let height = img.height;
                    
                    // 如果图片太大，缩放到画布大小
                    if (width > canvas.width || height > canvas.height) {
                        const scaleX = canvas.width / width;
                        const scaleY = canvas.height / height;
                        const scale = Math.min(scaleX, scaleY);
                        width = width * scale;
                        height = height * scale;
                    }
                    
                    // 创建一个特殊的背景图对象，添加到最底层（图层-1）
                    const bgObj = {
                        id: 'background-' + Date.now(),
                        isBackground: true,
                        image: img,
                        imageData: e.target.result,
                        layer: -1, // 最底层
                        x: 0,
                        y: 0,
                        width: width,
                        height: height,
                        rotation: 0,
                        collision: null
                    };
                    
                    console.log('背景图对象:', bgObj);
                    
                    // 移除旧的背景图
                    mapObjects = mapObjects.filter(obj => !obj.isBackground);
                    
                    // 添加新背景图
                    mapObjects.push(bgObj);
                    
                    console.log('当前对象数量:', mapObjects.length);
                    
                    render();
                };
                img.onerror = () => {
                    alert('图片加载失败');
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        // ========== 图层管理 ==========
        function renderLayerList() {
            const list = document.getElementById('layerList');
            list.innerHTML = '';
            
            // 按序号排序显示（序号小的在下面，所以倒序显示）
            const sortedLayers = [...layers].sort((a, b) => b.id - a.id);
            
            sortedLayers.forEach((layer, index) => {
                const item = document.createElement('div');
                item.className = 'layer-item' + (layer.id === currentLayer ? ' active' : '');
                item.draggable = true;
                item.dataset.layerId = layer.id;
                
                item.ondragstart = (e) => {
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', layer.id);
                };
                
                item.ondragover = (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                };
                
                item.ondrop = (e) => {
                    e.preventDefault();
                    const draggedId = parseInt(e.dataTransfer.getData('text/plain'));
                    const targetId = parseInt(item.dataset.layerId);
                    if (draggedId !== targetId) {
                        swapLayers(draggedId, targetId);
                    }
                };
                
                const info = document.createElement('div');
                info.style.flex = '1';
                info.innerHTML = `
                    <strong>${layer.name}</strong><br>
                    <span style="font-size: 10px; color: #999;">序号: ${layer.id}</span>
                `;
                info.onclick = () => selectLayer(layer.id);
                
                const controls = document.createElement('div');
                controls.className = 'layer-controls';
                controls.innerHTML = `
                    <button onclick="toggleLayerVisibility(${layer.id}); event.stopPropagation();">${layer.visible ? '👁️' : '🚫'}</button>
                    <button onclick="toggleLayerLock(${layer.id}); event.stopPropagation();">${layer.locked ? '🔒' : '🔓'}</button>
                    <button onclick="deleteLayer(${layer.id}); event.stopPropagation();">🗑️</button>

        function deleteLayer(id) {
            if (layers.length === 1) {
                alert('至少需要保留一个图层');
                return;
            }
            
            // 删除该图层的所有对象
            mapObjects = mapObjects.filter(obj => obj.layer !== id);
            
            // 删除该图层的所有独立碰撞区域
            collisionAreas = collisionAreas.filter(area => area.layer !== id);
            
            layers = layers.filter(l => l.id !== id);
            
            if (currentLayer === id) {
                currentLayer = layers[0].id;
            }
            
            renderLayerList();
            render();
        }
        
        function swapLayers(id1, id2) {
            const layer1 = layers.find(l => l.id === id1);
            const layer2 = layers.find(l => l.id === id2);
            
            if (layer1 && layer2) {
                // 交换ID（序号）
                const tempId = layer1.id;
                layer1.id = layer2.id;
                layer2.id = tempId;
                
                // 更新所有对象的图层ID
                mapObjects.forEach(obj => {
                    if (obj.layer === id1) obj.layer = layer2.id;
                    else if (obj.layer === id2) obj.layer = layer1.id;
                });
                
                // 更新所有独立碰撞区域的图层ID
                collisionAreas.forEach(area => {
                    if (area.layer === id1) area.layer = layer2.id;
                    else if (area.layer === id2) area.layer = layer1.id;
                });
                
                // 更新当前图层
                if (currentLayer === id1) currentLayer = layer2.id;
                else if (currentLayer === id2) currentLayer = layer1.id;
                
                renderLayerList();
                render();
            }
        }

                if (set.gridMode) {
                    // 网格模式：自动切分
                    sprites = [];

                        for (let col = 0; col < set.columns; col++) {
                            sprites.push({
                                x: col * set.tileWidth,
                                y: row * set.tileHeight,
                                width: set.tileWidth,
                                height: set.tileHeight,
                                name: `${row}-${col}`

                } else {
                    // 手动配置模式
                    sprites = set.sprites.map(s => ({

                        y: s.y,

                canvas.width = sprite.width;
                canvas.height = sprite.height;

                // 如果是完整图片素材
                if (sprite.isFullImage) {
                    ctx.drawImage(sprite.image, 0, 0);
                } else {
                    // 从瓦片集中裁剪
                    ctx.drawImage(spriteImage, sprite.x, sprite.y, sprite.width, sprite.height, 0, 0, sprite.width, sprite.height);

                label.style.fontSize = '10px';

        // ========== 地图渲染 ==========
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            // 应用画布偏移
            ctx.translate(canvasOffsetX, canvasOffsetY);
            
            // 绘制网格 - 预览模式下不显示
            if (showGrid && !isPreviewMode) {
                ctx.strokeStyle = 'rgba(100, 100, 100, 0.3)';
                ctx.lineWidth = 1;
                
                // 计算可见区域
                const startX = Math.floor(-canvasOffsetX / gridSize) * gridSize;
                const startY = Math.floor(-canvasOffsetY / gridSize) * gridSize;
                const endX = startX + canvas.width + gridSize;
                const endY = startY + canvas.height + gridSize;
                
                for (let x = startX; x <= endX; x += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(x, startY);
                    ctx.lineTo(x, endY);
                    ctx.stroke();
                }
                
                for (let y = startY; y <= endY; y += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(startX, y);
                    ctx.lineTo(endX, y);
                    ctx.stroke();
                }
            }
            
            // 按图层和Y坐标排序
            // 1. 先按图层ID排序（小的在下面）
            // 2. 同一图层内按Y坐标排序
            const sorted = [...mapObjects]
                .filter(obj => {
                    // 背景图对象总是显示
                    if (obj.isBackground) return true;
                    
                    // 其他对象检查图层可见性
                    const layer = layers.find(l => l.id === obj.layer);
                    return layer && layer.visible;
                })
                .sort((a, b) => {
                    if (a.layer !== b.layer) {
                        return a.layer - b.layer;
                    }
                    return (a.y + a.height) - (b.y + b.height);
                });
            
            console.log('渲染对象数量:', sorted.length);
            
            sorted.forEach(obj => {
                // 背景图对象
                if (obj.isBackground) {
                    ctx.save();
                    
                    // 非预览模式时，背景图添加半透明遮罩
                    if (!isPreviewMode) {
                        ctx.globalAlpha = 0.5;
                    } else {
                        ctx.globalAlpha = 1;
                    }
                    
                    // 如果有旋转，应用旋转变换
                    if (obj.rotation) {
                        const centerX = obj.x + obj.width / 2;
                        const centerY = obj.y + obj.height / 2;
                        ctx.translate(centerX, centerY);
                        ctx.rotate((obj.rotation * Math.PI) / 180);
                        ctx.translate(-centerX, -centerY);
                    }
                    
                    // 绘制背景图
                    ctx.drawImage(obj.image, obj.x, obj.y, obj.width, obj.height);
                    
                    ctx.restore();
                    
                    // 预览模式下不显示选中状态
                    if (!isPreviewMode && obj === selectedObject) {
                        ctx.strokeStyle = '#00ff00';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(obj.x, obj.y, obj.width, obj.height);
                        
                        // 绘制缩放手柄
                        const handleSize = 8;
                        const handles = [
                            {x: obj.x, y: obj.y},
                            {x: obj.x + obj.width, y: obj.y},
                            {x: obj.x, y: obj.y + obj.height},
                            {x: obj.x + obj.width, y: obj.y + obj.height}
                        ];
                        
                        ctx.fillStyle = '#00ff00';
                        handles.forEach(h => {
                            ctx.fillRect(h.x - handleSize/2, h.y - handleSize/2, handleSize, handleSize);
                        });
                    }
                    return;
                }
                
                // 组合对象
                if (obj.isGroup) {
                    // 绘制组合对象的所有子对象
                    obj.children.forEach(child => {
                        const childObj = {
                            ...child,
                            x: obj.x + child.relativeX,
                            y: obj.y + child.relativeY
                        };
                        
                        const sprite = childObj.spriteData || sprites[childObj.spriteIndex];
                        if (!sprite) return;
                        
                        // 获取对应的素材集图片
                        let spriteImg = spriteImage;
                        
                        if (childObj.spriteData) {
                            if (childObj.spriteData.isFullImage && childObj.spriteData.image) {
                                spriteImg = childObj.spriteData.image;
                            } else if (childObj.spriteData.spriteImageSrc) {
                                if (!childObj.spriteData._cachedImage) {
                                    childObj.spriteData._cachedImage = new Image();
                                    childObj.spriteData._cachedImage.src = childObj.spriteData.spriteImageSrc;
                                }
                                spriteImg = childObj.spriteData._cachedImage;
                            }
                        }
                        
                        ctx.save();
                        
                        // 非当前图层显示半透明（仅在非预览模式下）
                        if (!isPreviewMode && obj.layer !== currentLayer) {
                            ctx.globalAlpha = 0.3;
                        }
                        
                        // 如果有旋转，应用旋转变换
                        if (childObj.rotation) {
                            const centerX = childObj.x + childObj.width / 2;
                            const centerY = childObj.y + childObj.height / 2;
                            ctx.translate(centerX, centerY);
                            ctx.rotate((childObj.rotation * Math.PI) / 180);
                            ctx.translate(-centerX, -centerY);
                        }
                        
                        // 绘制素材
                        if (sprite.isFullImage && sprite.image) {
                            if (sprite.image.complete && sprite.image.naturalWidth > 0) {
                                ctx.drawImage(sprite.image, childObj.x, childObj.y, childObj.width, childObj.height);
                            }
                        } else {
                            if (spriteImg && spriteImg.complete && spriteImg.naturalWidth > 0) {
                                ctx.drawImage(
                                    spriteImg,
                                    sprite.x, sprite.y, sprite.width, sprite.height,
                                    childObj.x, childObj.y, childObj.width, childObj.height
                                );
                            }
                        }
                        
                        ctx.restore();
                    });
                    
                    // 绘制组合对象的碰撞框（如果有）- 根据复选框决定是否显示
                    if (showCollisionBoxes && obj.collision) {
                        ctx.strokeStyle = 'rgba(255, 0, 0, 0.6)';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(obj.collision.x, obj.collision.y, obj.collision.width, obj.collision.height);
                    }
                    
                    // 绘制选中状态 - 预览模式下不显示
                    if (!isPreviewMode && obj === selectedObject) {
                        ctx.strokeStyle = '#00ff00';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(obj.x, obj.y, obj.width, obj.height);
                        
                        // 绘制缩放手柄
                        const handleSize = 8;
                        const handles = [
                            {x: obj.x, y: obj.y},
                            {x: obj.x + obj.width, y: obj.y},
                            {x: obj.x, y: obj.y + obj.height},
                            {x: obj.x + obj.width, y: obj.y + obj.height}
                        ];
                        
                        ctx.fillStyle = '#00ff00';
                        handles.forEach(h => {
                            ctx.fillRect(h.x - handleSize/2, h.y - handleSize/2, handleSize, handleSize);
                        });
                    }
                    
                    // 绘制多选状态 - 预览模式下不显示
                    if (!isPreviewMode && selectedObjects.includes(obj)) {
                        ctx.strokeStyle = '#00aaff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(obj.x, obj.y, obj.width, obj.height);
                    }
                    
                    // 绘制对象属性标签 - 预览模式下不显示
                    if (!isPreviewMode && obj.property) {
                        const propertyLabels = {
                            'office': '🏢',
                            'apartment': '🏠',
                            'shop': '🏪',
                            'restaurant': '🍽️',
                            'park': '🌳',
                            'hospital': '🏥',
                            'school': '🏫',
                            'gym': '💪',
                            'cafe': '☕',
                            'library': '📚',
                            'cinema': '🎬',
                            'bank': '🏦',
                            'station': '🚉'
                        };
                        
                        const label = propertyLabels[obj.property] || '📍';

                // 普通素材对象

                if (obj.spriteData) {

            if (showCollisionBoxes) {

                        const handleSize = 8;
                        const handles = [

            if (!isPreviewMode && isDrawingCollision && collisionStart) {

            // 预览模式下绘制所有对象和角色 - 使用Y轴深度排序
            if (isPreviewMode) {

                // 创建包含所有对象和角色的排序数组

                sorted.forEach(obj => {

                    // 背景图和图层0的对象始终在最底层

                    } else if (obj.isGroup) {

                // 辅助函数：绘制对象
                function drawObject(obj) {
                    // 组合对象
                    if (obj.isGroup) {
                        // 绘制组合对象的所有子对象
                        obj.children.forEach(child => {
                            drawSingleObject({

                    // 背景图对象
                    if (obj.isBackground) {
                        ctx.save();
                        ctx.globalAlpha = 1;
                        
                        if (obj.rotation) {

                            spriteImg = obj.spriteData.image;

                        const centerY = obj.y + obj.height / 2;

                        ctx.rotate((obj.rotation * Math.PI) / 180);
                        ctx.translate(-centerX, -centerY);
                    }
                    
                    if (sprite.isFullImage && sprite.image) {

                            ctx.drawImage(sprite.image, obj.x, obj.y, obj.width, obj.height);
                        }
                    } else {
                        if (spriteImg && spriteImg.complete && spriteImg.naturalWidth > 0) {
                            ctx.drawImage(
                                spriteImg,
                                sprite.x, sprite.y, sprite.width, sprite.height,
                                obj.x, obj.y, obj.width, obj.height
                            );
                        }
                    }
                    
                    ctx.restore();
                }
                
                // 辅助函数：绘制角色
                function drawCharacter() {
                    const directionLayers = testCharacter.images.walk[testCharacter.direction];
                    const frameWidth = 32;
                    const frameHeight = 32;
                    const scale = 1;  // 使用原始大小，不放大
                    const frameX = testCharacter.frame * frameWidth;
                    
                    let hasImage = false;
                    CHARACTER_LAYER_ORDER.forEach(layer => {
                        if (layer === 'eyes' && testCharacter.direction === 'Back') {
                            return;
                        }
                        
                        const img = directionLayers[layer];
                        if (img && img.complete && img.naturalWidth > 0) {
                            hasImage = true;
                            const frameY = testCharacter.appearance[layer] * frameHeight;
                            
                            ctx.drawImage(
                                img,
                                frameX, frameY, frameWidth, frameHeight,
                                testCharacter.x, testCharacter.y, frameWidth * scale, frameHeight * scale
                            );
                        }

                    if (!hasImage) {
                        ctx.fillStyle = '#4CAF50';
                        ctx.fillRect(testCharacter.x, testCharacter.y, testCharacter.width, testCharacter.height - gridSize);
                        
                        ctx.fillStyle = '#2E7D32';
                        ctx.fillRect(testCharacter.x, testCharacter.y + testCharacter.height - gridSize, testCharacter.width, gridSize);
                        
                        ctx.fillStyle = '#FFD700';
                        ctx.beginPath();
                        ctx.arc(testCharacter.x + testCharacter.width / 2, testCharacter.y + 16, 12, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#000';
                        ctx.beginPath();
                        ctx.arc(testCharacter.x + testCharacter.width / 2 - 6, testCharacter.y + 14, 3, 0, Math.PI * 2);
                        ctx.arc(testCharacter.x + testCharacter.width / 2 + 6, testCharacter.y + 14, 3, 0, Math.PI * 2);

                        ctx.lineWidth = 2;
                        const footWidth = testCharacter.width * 0.4;  // 40%宽度，更窄
                        const footX = testCharacter.x + (testCharacter.width - footWidth) / 2;
                        const footY = testCharacter.y + testCharacter.height * 0.5;
                        const footHeight = testCharacter.height * 0.45;
                        ctx.strokeRect(footX, footY, footWidth, footHeight);

        // ========== 游戏循环（预览模式）==========
        let gameLoopId = null;
        
        function startGameLoop() {
            if (gameLoopId) return;
            
            function loop() {
                updateCharacter();
                render();
                gameLoopId = requestAnimationFrame(loop);
            }
            
            gameLoopId = requestAnimationFrame(loop);
        }
        
        function stopGameLoop() {
            if (gameLoopId) {
                cancelAnimationFrame(gameLoopId);
                gameLoopId = null;
            }
        }
        
        function updateCharacter() {
            let newX = testCharacter.x;
            let newY = testCharacter.y;
            
            // 检查是否有按键按下
            const isMoving = characterKeys.up || characterKeys.down || characterKeys.left || characterKeys.right;
            testCharacter.moving = isMoving;
            
            // 根据按键更新位置和方向
            if (characterKeys.up) {
                newY -= testCharacter.speed;
                testCharacter.direction = 'Back';
            }
            if (characterKeys.down) {
                newY += testCharacter.speed;
                testCharacter.direction = 'Front';
            }
            if (characterKeys.left) {
                newX -= testCharacter.speed;
                testCharacter.direction = 'Left';
            }
            if (characterKeys.right) {
                newX += testCharacter.speed;
                testCharacter.direction = 'Right';
            }
            
            // 更新动画帧
            if (isMoving) {
                testCharacter.frameTimer++;
                if (testCharacter.frameTimer >= testCharacter.frameDelay) {
                    testCharacter.frameTimer = 0;
                    testCharacter.frame = (testCharacter.frame + 1) % 4; // 4帧动画
                }
            } else {
                testCharacter.frame = 0; // 静止时使用第一帧
                testCharacter.frameTimer = 0;
            }
            
            // 检查碰撞
            if (!checkCollision(newX, newY)) {
                testCharacter.x = newX;
                testCharacter.y = newY;
            } else {
                // 尝试只在X轴移动
                if (!checkCollision(newX, testCharacter.y)) {
                    testCharacter.x = newX;
                }
                // 尝试只在Y轴移动
                else if (!checkCollision(testCharacter.x, newY)) {
                    testCharacter.y = newY;
                }
            }
            
            // 限制在画布内
            testCharacter.x = Math.max(0, Math.min(canvas.width - testCharacter.width, testCharacter.x));
            testCharacter.y = Math.max(0, Math.min(canvas.height - testCharacter.height, testCharacter.y));
        }
        
        function checkCollision(x, y) {
            // 角色脚部的碰撞框（调整为更窄的尺寸）
            const footWidth = testCharacter.width * 0.4;  // 40%宽度，更窄
            const footX = x + (testCharacter.width - footWidth) / 2;
            const footY = y + testCharacter.height * 0.5;  // 从50%位置开始
            const footHeight = testCharacter.height * 0.45; // 45%高度
            
            // 检查与独立碰撞区域的碰撞
            for (const area of collisionAreas) {
                const layer = layers.find(l => l.id === area.layer);
                if (!layer || !layer.visible) continue;
                
                if (rectIntersects(
                    footX, footY, footWidth, footHeight,
                    area.x, area.y, area.width, area.height
                )) {
                    return true;
                }
            }
            
            // 检查与对象碰撞框的碰撞
            for (const obj of mapObjects) {
                if (!obj.collision) continue;
                
                const layer = layers.find(l => l.id === obj.layer);
                if (!layer || !layer.visible) continue;
                
                if (rectIntersects(
                    footX, footY, footWidth, footHeight,
                    obj.collision.x, obj.collision.y, obj.collision.width, obj.collision.height
                )) {
                    return true;
                }
            }
            
            return false;
        }
        
        function rectIntersects(x1, y1, w1, h1, x2, y2, w2, h2) {
            return !(x1 + w1 <= x2 || x2 + w2 <= x1 || y1 + h1 <= y2 || y2 + h2 <= y1);
        }
        
        // ========== 鼠标交互 ==========
        canvas.onmousedown = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            // 阻止Ctrl+点击的默认行为
            if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
            }
            
            // V键按下时，进入画布平移模式
            if (isVKeyPressed) {
                isPanning = true;
                dragStart = {x: mouseX, y: mouseY};
                canvas.style.cursor = 'grabbing';
                return;
            }
            
            // 转换为画布坐标（考虑偏移）
            const x = mouseX - canvasOffsetX;
            const y = mouseY - canvasOffsetY;
            
            if (currentTool === 'select') {
                handleSelectMouseDown(x, y, e.ctrlKey || e.metaKey);
            } else if (currentTool === 'collision') {
                handleCollisionMouseDown(x, y);
            } else if (currentTool === 'delete') {
                isPainting = true;
                handleDeleteClick(x, y);
            } else if (currentTool === 'fill') {
                handleFillClick(x, y);
            }
            
            // 注意：不要在这里覆盖 dragStart，因为 handleSelectMouseDown 等函数已经正确设置了它
        };
        
        canvas.onmousemove = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            // 画布平移模式
            if (isPanning) {
                const dx = mouseX - dragStart.x;
                const dy = mouseY - dragStart.y;
                canvasOffsetX += dx;
                canvasOffsetY += dy;
                dragStart = {x: mouseX, y: mouseY};
                render();
                return;
            }
            
            // 转换为画布坐标（考虑偏移）
            const x = mouseX - canvasOffsetX;
            const y = mouseY - canvasOffsetY;
            
            if (isDragging && selectedObject) {
                selectedObject.x = x - dragStart.x;
                selectedObject.y = y - dragStart.y;
                render();
            } else if (isResizing && selectedObject) {
                handleResize(x, y);
                render();
            } else if (isDrawingCollision && collisionStart) {
                dragStart = {x, y};
                render();
            } else if (isPainting) {
                if (currentTool === 'select' && selectedSprite !== null) {
                    // 画笔模式：连续填充
                    paintAtPosition(x, y);
                } else if (currentTool === 'delete') {
                    // 橡皮擦模式：连续删除
                    eraseAtPosition(x, y);
                }
            }
        };
        
        canvas.onmouseup = () => {
            if (isDrawingCollision && collisionStart) {
                const x1 = Math.min(collisionStart.x, dragStart.x);

                const x2 = Math.max(collisionStart.x, dragStart.x);
                const y2 = Math.max(collisionStart.y, dragStart.y);
                const width = x2 - x1;
                const height = y2 - y1;
                
                // 如果有选中对象，为对象添加碰撞框
                if (selectedObject && !selectedObject.isCollisionArea) {

                        height: height
