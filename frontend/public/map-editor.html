                    updateObjectProps();
                } else if (width > 5 && height > 5) {
                    // 否则创建独立碰撞区域（空气墙）
                    const newArea = {
                        id: 'collision-' + Date.now(),
                        isCollisionArea: true,
                        layer: currentLayer,
                        x: x1,
                        y: y1,
                        width: width,
                        height: height
                    };
                    collisionAreas.push(newArea);
                    selectedObject = null;
                    updateObjectProps();
                }
            }
            
            if (isPanning) {
                canvas.style.cursor = isVKeyPressed ? 'grab' : 'crosshair';
            }
            
            isDragging = false;
            isResizing = false;
            isDrawingCollision = false;
            isPainting = false;
            isPanning = false;
            collisionStart = null;
            render();
        };
        
        // 双击事件：选中对象进入缩放模式
        canvas.ondblclick = (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            // 转换为画布坐标（考虑偏移）
            const x = mouseX - canvasOffsetX;
            const y = mouseY - canvasOffsetY;
            
            if (currentTool === 'select') {
                // 先检查独立碰撞区域
                for (let i = collisionAreas.length - 1; i >= 0; i--) {
                    const area = collisionAreas[i];
                    if (area.layer === currentLayer &&
                        x >= area.x && x <= area.x + area.width && 
                        y >= area.y && y <= area.y + area.height) {
                        selectedObject = area;
                        selectedObjects = [];
                        updateObjectProps();
                        render();
                        return;
                    }
                }
                
                // 检查是否双击了对象（包括组合对象）
                for (let i = mapObjects.length - 1; i >= 0; i--) {
                    const obj = mapObjects[i];
                    // 只能选中当前图层的对象，或者背景图（图层-1或0）
                    if ((obj.layer === currentLayer || obj.isBackground) &&
                        x >= obj.x && x <= obj.x + obj.width && 
                        y >= obj.y && y <= obj.y + obj.height) {
                        selectedObject = obj;
                        selectedObjects = [];
                        updateObjectProps();
                        render();
                        return;
                    }
                }
            }
        };
        
        function handleSelectMouseDown(x, y, isCtrlPressed) {
            const layer = layers.find(l => l.id === currentLayer);
            if (layer && layer.locked) {
                // 静默失败，不显示弹窗
                return;
            }
            
            // 检查是否点击了缩放手柄
            if (selectedObject && !isCtrlPressed) {
                const handle = getResizeHandle(selectedObject, x, y);
                if (handle) {
                    isResizing = true;
                    resizeHandle = handle;
                    dragStart = {x, y};
                    return;
                }
            }
            
            // 检查是否点击了独立碰撞区域
            for (let i = collisionAreas.length - 1; i >= 0; i--) {
                const area = collisionAreas[i];
                if (area.layer === currentLayer &&
                    x >= area.x && x <= area.x + area.width && 
                    y >= area.y && y <= area.y + area.height) {
                    
                    if (isCtrlPressed) {
                        // Ctrl多选
                        const index = selectedObjects.indexOf(area);
                        if (index === -1) {
                            selectedObjects.push(area);
                        } else {
                            selectedObjects.splice(index, 1);
                        }
                        selectedObject = null;
                        updateObjectProps();
                        render();
                        return;
                    }
                    
                    // 检查是否点击了缩放手柄
                    const handle = getResizeHandle(area, x, y);
                    if (handle) {
                        selectedObject = area;
                        selectedObjects = [];
                        isResizing = true;
                        resizeHandle = handle;
                        dragStart = {x, y};
                        updateObjectProps();
                        render();
                        return;
                    }
                    
                    // 否则开始拖动
                    selectedObject = area;
                    selectedObjects = [];
                    isDragging = true;
                    dragStart = {x: x - area.x, y: y - area.y};
                    updateObjectProps();
                    render();
                    return;
                }
            }
            
            // 检查是否点击了对象
            let clickedCurrentLayerObject = false;
            
            // 先检查当前图层的对象
            for (let i = mapObjects.length - 1; i >= 0; i--) {
                const obj = mapObjects[i];
                
                if (obj.layer === currentLayer &&
                    x >= obj.x && x <= obj.x + obj.width && 
                    y >= obj.y && y <= obj.y + obj.height) {
                    
                    if (isCtrlPressed) {
                        // Ctrl多选
                        const index = selectedObjects.indexOf(obj);
                        if (index === -1) {
                            selectedObjects.push(obj);
                        } else {
                            selectedObjects.splice(index, 1);
                        }
                        selectedObject = null;
                        updateObjectProps();
                        render();
                        return;
                    }
                    
                    selectedObject = obj;
                    selectedObjects = [];
                    isDragging = true;
                    dragStart = {x: x - obj.x, y: y - obj.y};
                    updateObjectProps();
                    render();
                    clickedCurrentLayerObject = true;
                    return;
                }
            }
            
            // 如果没有点击当前图层的对象，且当前图层是图层0，才允许选中背景图
            if (!clickedCurrentLayerObject && currentLayer === 0) {
                for (let i = mapObjects.length - 1; i >= 0; i--) {
                    const obj = mapObjects[i];
                    
                    if (obj.isBackground &&
                        x >= obj.x && x <= obj.x + obj.width && 
                        y >= obj.y && y <= obj.y + obj.height) {
                        selectedObject = obj;
                        isDragging = true;
                        dragStart = {x: x - obj.x, y: y - obj.y};
                        updateObjectProps();
                        render();
                        return;
                    }
                }
            }
            
            // 没有点击对象，开始画笔模式
            if (selectedSprite !== null) {
                isPainting = true;
                paintAtPosition(x, y);
            }
        }
        
        // 画笔功能：在指定位置放置素材（网格对齐）
        function paintAtPosition(x, y) {
            if (selectedSprite === null) return;
            
            const layer = layers.find(l => l.id === currentLayer);
            if (!layer || layer.locked) {
                return; // 静默失败，不显示提示
            }
            
            const sprite = sprites[selectedSprite];
            if (!sprite) return;
            
            // 对齐到网格
            const gridX = Math.floor(x / gridSize) * gridSize;
            const gridY = Math.floor(y / gridSize) * gridSize;
            
            // 检查这个位置是否已经有相同素材
            const exists = mapObjects.some(obj => 
                obj.spriteIndex === selectedSprite && 
                obj.x === gridX && 
                obj.y === gridY &&
                obj.layer === currentLayer
            );
            
            if (!exists) {
                // 使用记住的大小，如果没有则使用原始大小
                const customSize = spriteSizes[selectedSprite];
                const width = customSize ? customSize.width : sprite.width;
                const height = customSize ? customSize.height : sprite.height;
                const rotation = customSize ? (customSize.rotation || 0) : 0;
                
                // 深拷贝素材数据，保存图片引用
                const spriteDataCopy = {
                    x: sprite.x,
                    y: sprite.y,
                    width: sprite.width,
                    height: sprite.height,
                    name: sprite.name,
                    isFullImage: sprite.isFullImage,
                    image: sprite.image, // 保存图片引用（运行时使用）
                    imageSrc: sprite.image ? sprite.image.src : null, // 保存图片源（用于导出/导入）
                    spriteImageSrc: spriteImage ? spriteImage.src : null // 保存瓦片集图片源
                };
                
                const newObj = {
                    id: Date.now() + Math.random(),
                    spriteSetId: currentSpriteSetId, // 保存素材集ID
                    spriteIndex: selectedSprite,
                    spriteData: spriteDataCopy, // 保存素材数据副本
                    layer: currentLayer,
                    x: gridX,
                    y: gridY,
                    width: width,
                    height: height,
                    rotation: rotation,
                    collision: null
                };
                mapObjects.push(newObj);
                render();
            }
        }
        
        // 橡皮擦功能：擦除指定位置的素材
        function eraseAtPosition(x, y) {
            const layer = layers.find(l => l.id === currentLayer);
            if (!layer || layer.locked) return;
            
            // 先检查是否点击了独立碰撞区域
            for (let i = collisionAreas.length - 1; i >= 0; i--) {
                const area = collisionAreas[i];
                if (area.layer === currentLayer &&
                    x >= area.x && x <= area.x + area.width && 
                    y >= area.y && y <= area.y + area.height) {
                    collisionAreas.splice(i, 1);
                    if (selectedObject === area) {
                        selectedObject = null;
                        updateObjectProps();
                    }
                    render();
                    return;
                }
            }
            
            // 对齐到网格
            const gridX = Math.floor(x / gridSize) * gridSize;
            const gridY = Math.floor(y / gridSize) * gridSize;
            
            // 删除这个位置的对象
            for (let i = mapObjects.length - 1; i >= 0; i--) {
                const obj = mapObjects[i];
                if (obj.layer === currentLayer && 
                    Math.abs(obj.x - gridX) < gridSize / 2 && 
                    Math.abs(obj.y - gridY) < gridSize / 2) {
                    mapObjects.splice(i, 1);
                    if (selectedObject === obj) {
                        selectedObject = null;
                        updateObjectProps();
                    }
                    render();
                    return;
                }
            }
        }
        
        // 填充工具：填充整个画布
        function handleFillClick(x, y) {
            if (selectedSprite === null) {
                // 静默失败，不显示弹窗
                return;
            }
            
            const layer = layers.find(l => l.id === currentLayer);
            if (!layer || layer.locked) {
                // 静默失败，不显示弹窗
                return;
            }
            
            const sprite = sprites[selectedSprite];
            if (!sprite) return;
            
            const customSize = spriteSizes[selectedSprite];
            const width = customSize ? customSize.width : sprite.width;
            const height = customSize ? customSize.height : sprite.height;
            const rotation = customSize ? (customSize.rotation || 0) : 0;
            
            // 填充整个画布
            for (let y = 0; y < canvas.height; y += gridSize) {
                for (let x = 0; x < canvas.width; x += gridSize) {
                    const exists = mapObjects.some(obj => 
                        obj.spriteIndex === selectedSprite && 
                        obj.x === x && 
                        obj.y === y &&
                        obj.layer === currentLayer
                    );
                    
                    if (!exists) {
                        // 深拷贝素材数据，保存图片引用
                        const spriteDataCopy = {
                            x: sprite.x,
                            y: sprite.y,
                            width: sprite.width,
                            height: sprite.height,
                            name: sprite.name,
                            isFullImage: sprite.isFullImage,
                            image: sprite.image, // 保存图片引用（运行时使用）
                            imageSrc: sprite.image ? sprite.image.src : null, // 保存图片源（用于导出/导入）
                            spriteImageSrc: spriteImage ? spriteImage.src : null // 保存瓦片集图片源
                        };
                        
                        const newObj = {
                            id: Date.now() + Math.random(),
                            spriteSetId: currentSpriteSetId, // 保存素材集ID
                            spriteIndex: selectedSprite,
                            spriteData: spriteDataCopy, // 保存素材数据副本
                            layer: currentLayer,
                            x: x,
                            y: y,
                            width: width,
                            height: height,
                            rotation: rotation,
                            collision: null
                        };
                        mapObjects.push(newObj);
                    }
                }
            }
            render();
        }
        
        function handleCollisionMouseDown(x, y) {
            const layer = layers.find(l => l.id === currentLayer);
            if (layer && layer.locked) {
                // 静默失败，不显示弹窗
                return;
            }
            
            // 检查是否点击了已有的独立碰撞区域（用于选中和编辑）
            for (let i = collisionAreas.length - 1; i >= 0; i--) {
                const area = collisionAreas[i];
                if (area.layer === currentLayer &&
                    x >= area.x && x <= area.x + area.width && 
                    y >= area.y && y <= area.y + area.height) {
                    selectedObject = area;
                    isDragging = true;
                    dragStart = {x: x - area.x, y: y - area.y};
                    updateObjectProps();
                    render();
                    return;
                }
            }
            
            // 先检查是否点击了某个对象（只能选中当前图层的对象）
            if (!selectedObject) {
                for (let i = mapObjects.length - 1; i >= 0; i--) {
                    const obj = mapObjects[i];
                    if (obj.layer === currentLayer &&
                        x >= obj.x && x <= obj.x + obj.width && 
                        y >= obj.y && y <= obj.y + obj.height) {
                        selectedObject = obj;
                        updateObjectProps();
                        render();
                        break;
                    }
                }
            }
            
            // 如果没有选中对象，开始绘制独立碰撞区域（空气墙）
            if (!selectedObject) {
                isDrawingCollision = true;
                collisionStart = {x, y};
                dragStart = {x, y};
                return;
            }
            
            // 如果选中了对象，为该对象绘制碰撞框
            isDrawingCollision = true;
            collisionStart = {x, y};
            dragStart = {x, y};
        }
        
        function handleDeleteClick(x, y) {
            const layer = layers.find(l => l.id === currentLayer);
            if (!layer || layer.locked) return;
            
            // 如果是画笔模式（拖动），使用网格对齐删除
            if (isPainting) {
                eraseAtPosition(x, y);
                return;
            }
            
            // 检查是否点击了独立碰撞区域
            for (let i = collisionAreas.length - 1; i >= 0; i--) {
                const area = collisionAreas[i];
                if (area.layer === currentLayer &&
                    x >= area.x && x <= area.x + area.width && 
                    y >= area.y && y <= area.y + area.height) {
                    collisionAreas.splice(i, 1);
                    if (selectedObject === area) {
                        selectedObject = null;
                        updateObjectProps();
                    }
                    render();
                    return;
                }
            }
            
            // 否则精确点击删除普通对象
            for (let i = mapObjects.length - 1; i >= 0; i--) {
                const obj = mapObjects[i];
                if (obj.layer === currentLayer &&
                    x >= obj.x && x <= obj.x + obj.width && 
                    y >= obj.y && y <= obj.y + obj.height) {
                    mapObjects.splice(i, 1);
                    if (selectedObject === obj) {
                        selectedObject = null;
                        updateObjectProps();
                    }
                    render();
                    return;
                }
            }
        }
        
        function getResizeHandle(obj, x, y) {
            const handleSize = 12;
            const handles = {
                'nw': {x: obj.x, y: obj.y},
                'ne': {x: obj.x + obj.width, y: obj.y},
                'sw': {x: obj.x, y: obj.y + obj.height},
                'se': {x: obj.x + obj.width, y: obj.y + obj.height}
            };
            
            for (const [name, pos] of Object.entries(handles)) {
                if (Math.abs(x - pos.x) < handleSize && Math.abs(y - pos.y) < handleSize) {
                    return name;
                }
            }
            return null;
        }
        
        function handleResize(x, y) {
            const dx = x - dragStart.x;
            const dy = y - dragStart.y;
            
            // 独立碰撞区域 - 自由拉伸
            if (selectedObject.isCollisionArea) {
                switch (resizeHandle) {
                    case 'se':
                        selectedObject.width = Math.max(10, selectedObject.width + dx);
                        selectedObject.height = Math.max(10, selectedObject.height + dy);
                        break;
                    case 'nw':
                        const newWidth = Math.max(10, selectedObject.width - dx);
                        const newHeight = Math.max(10, selectedObject.height - dy);
                        selectedObject.x += selectedObject.width - newWidth;
                        selectedObject.y += selectedObject.height - newHeight;
                        selectedObject.width = newWidth;
                        selectedObject.height = newHeight;
                        break;
                    case 'ne':
                        selectedObject.width = Math.max(10, selectedObject.width + dx);
                        const h = Math.max(10, selectedObject.height - dy);
                        selectedObject.y += selectedObject.height - h;
                        selectedObject.height = h;
                        break;
                    case 'sw':
                        const w = Math.max(10, selectedObject.width - dx);
                        selectedObject.x += selectedObject.width - w;
                        selectedObject.width = w;
                        selectedObject.height = Math.max(10, selectedObject.height + dy);
                        break;
                }
                
                dragStart = {x, y};
                return;
            }
            
            // 背景图对象 - 自由拉伸，不保持宽高比
            if (selectedObject.isBackground) {
                switch (resizeHandle) {
                    case 'se':
                        selectedObject.width = Math.max(20, selectedObject.width + dx);
                        selectedObject.height = Math.max(20, selectedObject.height + dy);
                        break;
                    case 'nw':
                        const newWidth = Math.max(20, selectedObject.width - dx);
                        const newHeight = Math.max(20, selectedObject.height - dy);
                        selectedObject.x += selectedObject.width - newWidth;
                        selectedObject.y += selectedObject.height - newHeight;
                        selectedObject.width = newWidth;
                        selectedObject.height = newHeight;
                        break;
                    case 'ne':
                        selectedObject.width = Math.max(20, selectedObject.width + dx);
                        const h = Math.max(20, selectedObject.height - dy);
                        selectedObject.y += selectedObject.height - h;
                        selectedObject.height = h;
                        break;
                    case 'sw':
                        const w = Math.max(20, selectedObject.width - dx);
                        selectedObject.x += selectedObject.width - w;
                        selectedObject.width = w;
                        selectedObject.height = Math.max(20, selectedObject.height + dy);
                        break;
                }
                
                dragStart = {x, y};
                return;
            }
            
            // 组合对象 - 按比例缩放所有子对象
            if (selectedObject.isGroup) {
                const oldWidth = selectedObject.width;
                const oldHeight = selectedObject.height;
                let newWidth = oldWidth;
                let newHeight = oldHeight;
                let newX = selectedObject.x;
                let newY = selectedObject.y;
                
                switch (resizeHandle) {
                    case 'se':
                        newWidth = Math.max(20, oldWidth + dx);
                        newHeight = Math.max(20, oldHeight + dy);
                        break;
                    case 'nw':
                        newWidth = Math.max(20, oldWidth - dx);
                        newHeight = Math.max(20, oldHeight - dy);
                        newX = selectedObject.x + (oldWidth - newWidth);
                        newY = selectedObject.y + (oldHeight - newHeight);
                        break;
                    case 'ne':
                        newWidth = Math.max(20, oldWidth + dx);
                        newHeight = Math.max(20, oldHeight - dy);
                        newY = selectedObject.y + (oldHeight - newHeight);
                        break;
                    case 'sw':
                        newWidth = Math.max(20, oldWidth - dx);
                        newHeight = Math.max(20, oldHeight + dy);
                        newX = selectedObject.x + (oldWidth - newWidth);
                        break;
                }
                
                // 计算缩放比例
                const scaleX = newWidth / oldWidth;
                const scaleY = newHeight / oldHeight;
                
                // 按比例缩放所有子对象
                selectedObject.children.forEach(child => {
                    child.relativeX *= scaleX;
                    child.relativeY *= scaleY;
                    child.width *= scaleX;
                    child.height *= scaleY;
                    
                    // 如果子对象有碰撞框，也要缩放
                    if (child.collision) {
                        child.collision.x *= scaleX;
                        child.collision.y *= scaleY;
                        child.collision.width *= scaleX;
                        child.collision.height *= scaleY;
                    }
                });
                
                // 如果组合对象有碰撞框，也要缩放
                if (selectedObject.collision) {
                    const collisionScaleX = newWidth / oldWidth;
                    const collisionScaleY = newHeight / oldHeight;
                    selectedObject.collision.width *= collisionScaleX;
                    selectedObject.collision.height *= collisionScaleY;
                }
                
                selectedObject.x = newX;
                selectedObject.y = newY;
                selectedObject.width = newWidth;
                selectedObject.height = newHeight;
                
                dragStart = {x, y};
                return;
            }
            
            // 普通素材对象 - 保持宽高比
            const sprite = selectedObject.spriteData || sprites[selectedObject.spriteIndex];
            if (!sprite) {
                // 如果没有素材数据，自由拉伸
                switch (resizeHandle) {
                    case 'se':
                        selectedObject.width = Math.max(20, selectedObject.width + dx);
                        selectedObject.height = Math.max(20, selectedObject.height + dy);
                        break;
                    case 'nw':
                        const newWidth = Math.max(20, selectedObject.width - dx);
                        const newHeight = Math.max(20, selectedObject.height - dy);
                        selectedObject.x += selectedObject.width - newWidth;
                        selectedObject.y += selectedObject.height - newHeight;
                        selectedObject.width = newWidth;
                        selectedObject.height = newHeight;
                        break;
                    case 'ne':
                        selectedObject.width = Math.max(20, selectedObject.width + dx);
                        const h = Math.max(20, selectedObject.height - dy);
                        selectedObject.y += selectedObject.height - h;
                        selectedObject.height = h;
                        break;
                    case 'sw':
                        const w = Math.max(20, selectedObject.width - dx);
                        selectedObject.x += selectedObject.width - w;
                        selectedObject.width = w;
                        selectedObject.height = Math.max(20, selectedObject.height + dy);
                        break;
                }
                dragStart = {x, y};
                return;
            }
            
            const aspectRatio = sprite.width / sprite.height;
            
            switch (resizeHandle) {
                case 'se':
                    selectedObject.width = Math.max(20, selectedObject.width + dx);
                    selectedObject.height = selectedObject.width / aspectRatio;
                    break;
                case 'nw':
                    const newWidth = Math.max(20, selectedObject.width - dx);
                    const newHeight = newWidth / aspectRatio;
                    selectedObject.x += selectedObject.width - newWidth;
                    selectedObject.y += selectedObject.height - newHeight;
                    selectedObject.width = newWidth;
                    selectedObject.height = newHeight;
                    break;
                case 'ne':
                    selectedObject.width = Math.max(20, selectedObject.width + dx);
                    const h = selectedObject.width / aspectRatio;
                    selectedObject.y += selectedObject.height - h;
                    selectedObject.height = h;
                    break;
                case 'sw':
                    const w = Math.max(20, selectedObject.width - dx);
                    selectedObject.x += selectedObject.width - w;
                    selectedObject.width = w;
                    selectedObject.height = w / aspectRatio;
                    break;
            }
            
            // 记住这个素材的自定义大小
            if (selectedObject.spriteIndex !== undefined) {
                spriteSizes[selectedObject.spriteIndex] = {
                    width: selectedObject.width,
                    height: selectedObject.height
                };
            }
            
            dragStart = {x, y};
        }
        
        function updateObjectProps() {
            const panel = document.getElementById('objectProps');
            
            // 显示多选对象信息
            if (selectedObjects.length > 0) {
                let html = `<div class="info">
                    <strong>已选择 ${selectedObjects.length} 个对象</strong><br>
                    按 G 键组合这些对象
                </div>`;
                
                html += '<div style="max-height: 200px; overflow-y: auto; margin-top: 10px;">';
                selectedObjects.forEach((obj, index) => {
                    const type = obj.isCollisionArea ? '碰撞区域' : '素材对象';
                    html += `
                        <div class="info" style="margin: 4px 0; padding: 4px; font-size: 10px; border-left: 3px solid #00aaff;">
                            <strong>#${index + 1}</strong> ${type}<br>
                            图层: ${obj.layer}<br>
                            位置: (${Math.round(obj.x)}, ${Math.round(obj.y)})<br>
                            尺寸: ${Math.round(obj.width)} x ${Math.round(obj.height)}
                        </div>
                    `;
                });
                html += '</div>';
                
                panel.innerHTML = html;
                return;
            }
            
            if (!selectedObject) {
                // 显示独立碰撞区域列表
                const areaCount = collisionAreas.length;
                let html = '<div class="info">未选中任何对象</div>';
                
                if (areaCount > 0) {
                    html += `<h4 style="margin-top: 10px; font-size: 12px;">独立碰撞区域 (${areaCount})</h4>`;

        // ========== 导出/导入 ==========
        function exportMap() {
            // 处理对象，移除不能序列化的图片对象
            const exportObjects = mapObjects.map(obj => {
                if (obj.isBackground) {
                    return {
                        ...obj,
                        image: undefined, // 移除image对象
                        imageData: obj.imageData // 使用保存的base64数据
                    };
                }
                
                // 普通素材对象
                const exportObj = {...obj};
                
                // 如果有spriteData，清理不能序列化的部分
                if (exportObj.spriteData) {
                    exportObj.spriteData = {
                        ...exportObj.spriteData,
                        image: undefined, // 移除运行时的图片对象
                        _cachedImage: undefined // 移除缓存的图片对象
                        // 保留 imageSrc 和 spriteImageSrc 用于重新加载
                    };
                }
                
                return exportObj;
            });
            
            const data = {
                gridSize: gridSize,
                cols: Math.round(canvas.width / gridSize),
                rows: Math.round(canvas.height / gridSize),
                width: canvas.width,
                height: canvas.height,
                layers: layers,
                objects: exportObjects,
                collisionAreas: collisionAreas // 导出独立碰撞区域
            };
            document.getElementById('mapData').value = JSON.stringify(data, null, 2);
        }
        
        function importMap() {
            try {
                const data = JSON.parse(document.getElementById('mapData').value);
                
                // 处理对象，将背景图的imageData转换回image，并重新加载瓦片集图片
                const importObjects = [];
                const loadPromises = [];
                
                // 辅助函数：收集对象的瓦片集图片URL
                function collectSpriteUrls(obj, urlSet) {
                    if (obj.spriteData && obj.spriteData.spriteImageSrc) {
                        urlSet.add(obj.spriteData.spriteImageSrc);
                    }
                    // 如果是组合对象，递归处理子对象
                    if (obj.isGroup && obj.children) {
                        obj.children.forEach(child => collectSpriteUrls(child, urlSet));
                    }
                }
                
                // 辅助函数：为对象设置缓存的图片引用
                function setCachedImages(obj, imageCache) {
                    if (obj.spriteData && obj.spriteData.spriteImageSrc) {
                        const cachedImg = imageCache[obj.spriteData.spriteImageSrc];
                        if (cachedImg) {
                            obj.spriteData._cachedImage = cachedImg;
                        }
                    }
                    // 如果是组合对象，递归处理子对象
                    if (obj.isGroup && obj.children) {
                        obj.children.forEach(child => setCachedImages(child, imageCache));
                    }
                }
                
                // 收集所有需要加载的瓦片集图片URL（去重）
                const spriteImageUrls = new Set();
                (data.objects || []).forEach(obj => {
                    collectSpriteUrls(obj, spriteImageUrls);
                });
                
                // 预加载所有瓦片集图片
                const spriteImageCache = {};
                spriteImageUrls.forEach(url => {
                    const promise = new Promise((resolve) => {
                        const img = new Image();
                        img.crossOrigin = 'anonymous';
                        img.onload = () => {
                            spriteImageCache[url] = img;
                            console.log('✓ 加载瓦片集图片:', url);
                            resolve();
                        };
                        img.onerror = () => {
                            console.error('✗ 加载瓦片集图片失败:', url);
                            resolve(); // 即使失败也继续
                        };
                        img.src = url;
                    });
                    loadPromises.push(promise);
                });
                
                // 处理背景图
                (data.objects || []).forEach(obj => {
                    if (obj.isBackground && obj.imageData) {
                        const promise = new Promise((resolve) => {
                            const img = new Image();
                            img.onload = () => {
                                importObjects.push({
                                    ...obj,
                                    image: img,
                                    imageData: obj.imageData
                                });
                                console.log('✓ 加载背景图');
                                resolve();
                            };
                            img.onerror = () => {
                                console.error('✗ 加载背景图失败');
                                resolve();
                            };
                            img.src = obj.imageData;
                        });
                        loadPromises.push(promise);
                    } else {
                        // 确保所有对象都有图层属性
                        if (obj.layer === undefined) {
                            obj.layer = 0;
                        }
                        
                        // 如果对象有瓦片集素材数据，恢复缓存的图片引用
                        if (obj.spriteData && obj.spriteData.spriteImageSrc) {
                            // 清理旧的空对象
                            delete obj.spriteData._cachedImage;
                        }
                        
                        // 如果是完整图片素材，需要重新加载图片
                        if (obj.spriteData && obj.spriteData.isFullImage && obj.spriteData.imageSrc) {
                            const promise = new Promise((resolve) => {
                                const img = new Image();
                                img.crossOrigin = 'anonymous';
                                img.onload = () => {
                                    obj.spriteData.image = img;
                                    console.log('✓ 加载完整图片素材');
                                    resolve();
                                };
                                img.onerror = () => {
                                    console.error('✗ 加载完整图片素材失败');
                                    resolve();
                                };
                                img.src = obj.spriteData.imageSrc;
                            });
                            loadPromises.push(promise);
                        }
                        
                        importObjects.push(obj);
                    }
                });
                
                // 等待所有图片加载完成
                Promise.all(loadPromises).then(() => {
                    // 为所有对象设置缓存的图片引用（包括组合对象的子对象）
                    importObjects.forEach(obj => {
                        setCachedImages(obj, spriteImageCache);
                    });
                    
                    mapObjects = importObjects;
                    
                    // 导入独立碰撞区域
                    collisionAreas = data.collisionAreas || [];
                    
                    layers = data.layers || [{id: 0, name: '图层 0', visible: true, locked: false}];
                    currentLayer = layers[0].id;
                    
                    // 优先使用格子数量，如果没有则使用像素尺寸
                    if (data.gridSize) {
                        gridSize = data.gridSize;
                        document.getElementById('gridSize').value = gridSize;
                    }
                    
                    if (data.cols && data.rows) {
                        canvas.width = data.cols * gridSize;
                        canvas.height = data.rows * gridSize;
                        document.getElementById('mapCols').value = data.cols;
                        document.getElementById('mapRows').value = data.rows;
                    } else {
                        canvas.width = data.width || 960;
                        canvas.height = data.height || 704;
                        document.getElementById('mapCols').value = Math.round(canvas.width / gridSize);
                        document.getElementById('mapRows').value = Math.round(canvas.height / gridSize);
                    }
                    
                    selectedObject = null;
                    updateObjectProps();
                    renderLayerList();
                    render();
                });
            } catch (e) {
                alert('导入失败：' + e.message);
            }
        }
        
        // ========== 云端保存/加载 ==========
        async function saveMapToCloud() {
            try {
                // 获取地图名称
                const mapNameInput = document.getElementById('mapName');
                const mapName = mapNameInput.value.trim();
                
                if (!mapName) {
                    alert('请输入地图名称');
                    return;
                }
                
                // 准备地图数据（与exportMap相同的逻辑）
                const exportObjects = mapObjects.map(obj => {
                    if (obj.isBackground) {
                        return {
                            ...obj,
                            image: undefined,
                            imageData: obj.imageData
                        };
                    }
                    
                    const exportObj = {...obj};
                    
                    if (exportObj.spriteData) {
                        exportObj.spriteData = {
                            ...exportObj.spriteData,
                            image: undefined,
                            _cachedImage: undefined
                        };
                    }
                    
                    return exportObj;
                });
                
                const mapData = {
                    gridSize: gridSize,
                    cols: Math.round(canvas.width / gridSize),
                    rows: Math.round(canvas.height / gridSize),
                    width: canvas.width,
                    height: canvas.height,
                    layers: layers,
                    objects: exportObjects,
                    collisionAreas: collisionAreas
                };
                
                // 发送到后端API
                const response = await fetch(`${API_URL}/api/map-editor/map`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        map: mapData,
                        mapName: mapName,
                        mapId: currentMapId // 如果有ID，则更新现有地图
                    })
                });
                
                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Error response:', errorText);
                    let errorMessage = '保存失败';
                    try {
                        const error = JSON.parse(errorText);
                        errorMessage = error.error || errorMessage;
                    } catch (e) {
                        errorMessage = errorText || errorMessage;
                    }
                    throw new Error(errorMessage);
                }
                
                const resultText = await response.text();
                console.log('Success response:', resultText);
                const result = JSON.parse(resultText);
                console.log('地图保存成功:', result);
                
                // 保存地图ID，下次保存时更新而不是创建新地图
                currentMapId = result.mapId;
                
                // 在界面上显示成功提示（不用弹窗）
                const toolInfo = document.getElementById('toolInfo');
                const originalText = toolInfo.textContent;
                toolInfo.textContent = '✅ 地图已保存到云端';
                toolInfo.style.color = '#4CAF50';
                setTimeout(() => {
                    toolInfo.textContent = originalText;
                    toolInfo.style.color = '';
                }, 3000);
                
            } catch (error) {
                console.error('保存地图失败:', error);
                alert('保存失败：' + error.message);
            }
        }

        function updateGridSize() {
            const oldGridSize = gridSize;
            gridSize = parseInt(document.getElementById('gridSize').value) || 32;
            
            // 重新计算画布大小
            const cols = Math.round(canvas.width / oldGridSize);
            const rows = Math.round(canvas.height / oldGridSize);
            canvas.width = cols * gridSize;
            canvas.height = rows * gridSize;
            
            // 更新输入框
            document.getElementById('mapCols').value = cols;
            document.getElementById('mapRows').value = rows;
            
            render();
        }
        
        function toggleGrid() {
            showGrid = document.getElementById('showGrid').checked;
            render();
        }
        
        function toggleCollisionBoxes() {
            showCollisionBoxes = document.getElementById('showCollisionCheckbox').checked;
            render();
        }
        
        // 初始化
        renderLayerList();
        render();
        
        // 默认加载第一个素材集
        document.getElementById('spriteSource').value = 'urbanB';
        loadSprites();
    </script>
</body>
</html>
