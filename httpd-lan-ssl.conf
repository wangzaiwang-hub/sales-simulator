# Apache HTTPS反向代理配置 - 局域网访问

ServerRoot "/usr"
Listen 443

# 加载必要的模块
LoadModule mpm_prefork_module libexec/apache2/mod_mpm_prefork.so
LoadModule authn_core_module libexec/apache2/mod_authn_core.so
LoadModule authz_core_module libexec/apache2/mod_authz_core.so
LoadModule log_config_module libexec/apache2/mod_log_config.so
LoadModule mime_module libexec/apache2/mod_mime.so
LoadModule unixd_module libexec/apache2/mod_unixd.so
LoadModule dir_module libexec/apache2/mod_dir.so
LoadModule alias_module libexec/apache2/mod_alias.so
LoadModule rewrite_module libexec/apache2/mod_rewrite.so

# SSL模块
LoadModule ssl_module libexec/apache2/mod_ssl.so
LoadModule socache_shmcb_module libexec/apache2/mod_socache_shmcb.so

# 反向代理模块
LoadModule proxy_module libexec/apache2/mod_proxy.so
LoadModule proxy_http_module libexec/apache2/mod_proxy_http.so
LoadModule proxy_wstunnel_module libexec/apache2/mod_proxy_wstunnel.so

# SSL会话缓存
SSLSessionCache "shmcb:/usr/local/var/run/apache2/ssl_scache(512000)"
SSLSessionCacheTimeout 300

# 日志配置
ErrorLog "/usr/local/var/log/httpd/error_log"
LogLevel warn
LogFormat "%h %l %u %t \"%r\" %>s %b" common
CustomLog "/usr/local/var/log/httpd/access_log" common

# 基础安全配置
<Directory />
    AllowOverride none
    Require all denied
</Directory>

# MIME类型
TypesConfig /etc/apache2/mime.types

# HTTPS虚拟主机
<VirtualHost *:443>
    ServerAdmin admin@localhost
    
    # SSL配置
    SSLEngine on
    SSLCertificateFile "CERT_PATH/server.crt"
    SSLCertificateKeyFile "CERT_PATH/server.key"
    
    # SSL协议配置
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on
    
    # 启用反向代理
    ProxyPreserveHost On
    ProxyRequests Off
    
    # 直接提供资源文件（不通过代理）
    Alias /resource "BACKEND_DIR/resource"
    <Directory "BACKEND_DIR/resource">
        Require all granted
        Options Indexes FollowSymLinks
    </Directory>
    
    # ProxyPass规则使用Location块确保优先级
    
    # 工具页面代理到后端
    <Location /tools>
        ProxyPass http://localhost:3001/tools
        ProxyPassReverse http://localhost:3001/tools
    </Location>
    
    # API代理到后端
    <Location /api>
        ProxyPass http://localhost:3001/api
        ProxyPassReverse http://localhost:3001/api
    </Location>
    
    # WebSocket支持（只对特定路径启用）
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteCond %{REQUEST_URI} !^/resource [NC]
    RewriteCond %{REQUEST_URI} !^/tools [NC]
    RewriteCond %{REQUEST_URI} !^/api [NC]
    RewriteRule ^/?(.*) "ws://localhost:3000/$1" [P,L]
    
    # 其他请求代理到前端（放在最后）
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/
    
    # 日志
    ErrorLog "/usr/local/var/log/httpd/lan_ssl_error_log"
    CustomLog "/usr/local/var/log/httpd/lan_ssl_access_log" common
</VirtualHost>
