<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色编辑器 - Character Editor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(10px);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 32px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .editor-layout {
      display: grid;
      grid-template-columns: 300px 1fr 350px;
      gap: 20px;
      margin-top: 20px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 15px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .panel h2 {
      font-size: 18px;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
    }

    .sprite-preview {
      text-align: center;
      margin-bottom: 20px;
    }

    #spriteCanvas {
      border: 2px solid #fff;
      background: #2a2a2a;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      cursor: crosshair;
      width: 100%;
      height: auto;
    }

    .preview-canvas {
      border: 2px solid #fff;
      background: #2a2a2a;
      image-rendering: pixelated;
      margin: 10px auto;
      display: block;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
      font-size: 14px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-family: 'Courier New', monospace;
    }

    .form-group input[type="number"] {
      width: 80px;
    }

    .inline-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-primary {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    .btn-success {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }

    .character-list {
      max-height: 400px;
      overflow-y: auto;
      margin-top: 10px;
    }

    .character-item {
      background: rgba(0, 0, 0, 0.3);
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .character-item:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .character-item.active {
      border-color: #4facfe;
      background: rgba(79, 172, 254, 0.2);
    }

    .character-item h3 {
      font-size: 16px;
      margin-bottom: 5px;
    }

    .character-item p {
      font-size: 12px;
      opacity: 0.8;
    }

    .direction-preview {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 15px;
    }

    .direction-item {
      text-align: center;
    }

    .direction-item p {
      margin-top: 5px;
      font-size: 12px;
    }

    .info-box {
      background: rgba(79, 172, 254, 0.2);
      padding: 10px;
      border-radius: 4px;
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.6;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .button-group button {
      flex: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 角色编辑器 Character Editor</h1>
    
    <div class="editor-layout">
      <!-- 左侧：精灵图选择 -->
      <div class="panel">
        <h2>📁 精灵图</h2>
        
        <div class="form-group">
          <label>选择精灵图文件：</label>
          <input type="file" id="spriteInput" accept="image/*">
        </div>

        <div class="sprite-preview">
          <canvas id="spriteCanvas" width="256" height="192"></canvas>
          <p style="margin-top: 10px; font-size: 12px;">当前尺寸: <span id="spriteSize">未加载</span></p>
        </div>

        <div class="info-box">
          💡 点击精灵图选择角色位置<br>
          • 每个角色占用4行（前/左/右/后）<br>
          • 每行3帧动画<br>
          • 标准尺寸：32x48像素
        </div>
      </div>

      <!-- 中间：角色配置 -->
      <div class="panel">
        <h2>⚙️ 角色配置</h2>
        
        <div class="form-group">
          <label>角色名称：</label>
          <input type="text" id="characterName" placeholder="输入角色名称">
        </div>

        <div class="form-group">
          <label>角色类型：</label>
          <select id="characterType">
            <option value="player">玩家角色</option>
            <option value="npc">NPC</option>
          </select>
        </div>

        <div class="form-group">
          <label>精灵图列偏移（Column Offset）：</label>
          <div class="inline-group">
            <input type="number" id="columnOffset" value="0" min="0">
            <span>（点击精灵图自动设置）</span>
          </div>
        </div>

        <div class="form-group">
          <label>精灵图行起始（Character Row）：</label>
          <div class="inline-group">
            <input type="number" id="characterRow" value="0" min="0">
            <span>（点击精灵图自动设置）</span>
          </div>
        </div>

        <h2 style="margin-top: 30px;">👁️ 方向预览</h2>
        <div class="direction-preview">
          <div class="direction-item">
            <canvas id="previewFront" width="96" height="144"></canvas>
            <p>前 Front</p>
          </div>
          <div class="direction-item">
            <canvas id="previewLeft" width="96" height="144"></canvas>
            <p>左 Left</p>
          </div>
          <div class="direction-item">
            <canvas id="previewRight" width="96" height="144"></canvas>
            <p>右 Right</p>
          </div>
          <div class="direction-item">
            <canvas id="previewBack" width="96" height="144"></canvas>
            <p>后 Back</p>
          </div>
        </div>

        <div class="button-group">
          <button class="btn-primary" onclick="saveCharacter()">💾 保存角色</button>
          <button class="btn-success" onclick="exportCharacters()">📤 导出配置</button>
        </div>
      </div>

      <!-- 右侧：角色列表 -->
      <div class="panel">
        <h2>👥 角色列表</h2>
        
        <button onclick="newCharacter()" style="width: 100%; margin-bottom: 10px;">➕ 新建角色</button>
        
        <div class="character-list" id="characterList"></div>

        <div class="info-box" style="margin-top: 15px;">
          📋 已保存 <span id="characterCount">0</span> 个角色<br>
          点击角色可编辑
        </div>
      </div>
    </div>
  </div>

  <script>
    let spriteImage = null;
    let characters = [];
    let currentCharacterId = null;

    const spriteCanvas = document.getElementById('spriteCanvas');
    const spriteCtx = spriteCanvas.getContext('2d');
    spriteCtx.imageSmoothingEnabled = false;

    // 加载精灵图
    document.getElementById('spriteInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        spriteImage = new Image();
        spriteImage.onload = () => {
          drawSpriteSheet();
        };
        spriteImage.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    // 绘制精灵图
    function drawSpriteSheet() {
      if (!spriteImage) return;
      
      // 调整canvas大小以适应图片
      const scale = Math.min(256 / spriteImage.width, 192 / spriteImage.height);
      spriteCanvas.width = spriteImage.width;
      spriteCanvas.height = spriteImage.height;
      
      spriteCtx.clearRect(0, 0, spriteCanvas.width, spriteCanvas.height);
      spriteCtx.drawImage(spriteImage, 0, 0);
      
      // 更新尺寸显示
      document.getElementById('spriteSize').textContent = `${spriteImage.width}x${spriteImage.height}`;
      
      // 绘制网格
      spriteCtx.strokeStyle = 'rgba(255, 0, 0, 0.5)';
      spriteCtx.lineWidth = 1;
      
      // 垂直线（每32像素）
      for (let x = 0; x <= spriteCanvas.width; x += 32) {
        spriteCtx.beginPath();
        spriteCtx.moveTo(x, 0);
        spriteCtx.lineTo(x, spriteCanvas.height);
        spriteCtx.stroke();
      }
      
      // 水平线（每48像素）
      for (let y = 0; y <= spriteCanvas.height; y += 48) {
        spriteCtx.beginPath();
        spriteCtx.moveTo(0, y);
        spriteCtx.lineTo(spriteCanvas.width, y);
        spriteCtx.stroke();
      }
      
      // 绘制当前选中的框
      const columnOffset = parseInt(document.getElementById('columnOffset').value) || 0;
      const characterRow = parseInt(document.getElementById('characterRow').value) || 0;
      
      spriteCtx.strokeStyle = 'rgba(0, 255, 0, 0.8)';
      spriteCtx.lineWidth = 2;
      
      // 绘制4行选中框
      for (let row = 0; row < 4; row++) {
        for (let col = 0; col < 3; col++) {
          const x = (columnOffset + col) * 32;
          const y = (characterRow + row) * 48;
          spriteCtx.strokeRect(x, y, 32, 48);
        }
      }
    }

    // 点击精灵图选择角色
    spriteCanvas.addEventListener('click', (e) => {
      if (!spriteImage) return;
      
      const rect = spriteCanvas.getBoundingClientRect();
      const scaleX = spriteCanvas.width / rect.width;
      const scaleY = spriteCanvas.height / rect.height;
      
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;
      
      const col = Math.floor(x / 32);
      const row = Math.floor(y / 48);
      
      document.getElementById('columnOffset').value = col;
      document.getElementById('characterRow').value = row;
      
      drawSpriteSheet();
      updatePreview();
    });

    // 更新预览
    function updatePreview() {
      if (!spriteImage) return;
      
      const columnOffset = parseInt(document.getElementById('columnOffset').value) || 0;
      const characterRow = parseInt(document.getElementById('characterRow').value) || 0;
      
      const directions = [
        { canvas: 'previewFront', row: 0 },
        { canvas: 'previewLeft', row: 1 },
        { canvas: 'previewRight', row: 2 },
        { canvas: 'previewBack', row: 3 }
      ];
      
      directions.forEach(dir => {
        const canvas = document.getElementById(dir.canvas);
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const row = characterRow + dir.row;
        
        // 绘制3帧动画
        for (let frame = 0; frame < 3; frame++) {
          const srcX = (columnOffset + frame) * 32;
          const srcY = row * 48;
          const destX = frame * 32;
          
          ctx.drawImage(
            spriteImage,
            srcX, srcY, 32, 48,
            destX, 0, 32, 48
          );
        }
      });
    }

    // 监听输入变化
    document.getElementById('columnOffset').addEventListener('input', () => {
      drawSpriteSheet();
      updatePreview();
    });
    document.getElementById('characterRow').addEventListener('input', () => {
      drawSpriteSheet();
      updatePreview();
    });

    // 新建角色
    function newCharacter() {
      currentCharacterId = Date.now().toString();
      document.getElementById('characterName').value = '';
      document.getElementById('characterType').value = 'npc';
      document.getElementById('columnOffset').value = '0';
      document.getElementById('characterRow').value = '0';
      updatePreview();
    }

    // 保存角色
    function saveCharacter() {
      const name = document.getElementById('characterName').value.trim();
      if (!name) {
        alert('请输入角色名称！');
        return;
      }
      
      if (!spriteImage) {
        alert('请先选择精灵图！');
        return;
      }
      
      const character = {
        id: currentCharacterId || Date.now().toString(),
        name: name,
        type: document.getElementById('characterType').value,
        spriteColumnOffset: parseInt(document.getElementById('columnOffset').value) || 0,
        characterRow: parseInt(document.getElementById('characterRow').value) || 0,
        spriteImage: spriteImage.src
      };
      
      const existingIndex = characters.findIndex(c => c.id === character.id);
      if (existingIndex >= 0) {
        characters[existingIndex] = character;
      } else {
        characters.push(character);
      }
      
      updateCharacterList();
      alert('角色已保存！');
    }

    // 更新角色列表
    function updateCharacterList() {
      const list = document.getElementById('characterList');
      list.innerHTML = '';
      
      characters.forEach(char => {
        const item = document.createElement('div');
        item.className = 'character-item';
        if (char.id === currentCharacterId) {
          item.classList.add('active');
        }
        
        item.innerHTML = `
          <h3>${char.name}</h3>
          <p>类型: ${char.type === 'player' ? '玩家' : 'NPC'}</p>
          <p>列: ${char.spriteColumnOffset}, 行: ${char.characterRow}</p>
        `;
        
        item.onclick = () => loadCharacter(char.id);
        list.appendChild(item);
      });
      
      document.getElementById('characterCount').textContent = characters.length;
    }

    // 加载角色
    function loadCharacter(id) {
      const char = characters.find(c => c.id === id);
      if (!char) return;
      
      currentCharacterId = id;
      document.getElementById('characterName').value = char.name;
      document.getElementById('characterType').value = char.type;
      document.getElementById('columnOffset').value = char.spriteColumnOffset;
      document.getElementById('characterRow').value = char.characterRow;
      
      // 加载精灵图
      if (char.spriteImage) {
        spriteImage = new Image();
        spriteImage.onload = () => {
          drawSpriteSheet();
          updatePreview();
        };
        spriteImage.src = char.spriteImage;
      }
      
      updateCharacterList();
    }

    // 导出配置
    function exportCharacters() {
      if (characters.length === 0) {
        alert('没有角色可导出！');
        return;
      }
      
      const config = {
        characters: characters.map(char => ({
          id: char.id,
          name: char.name,
          type: char.type,
          spriteColumnOffset: char.spriteColumnOffset,
          characterRow: char.characterRow
        }))
      };
      
      const json = JSON.stringify(config, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'characters-config.json';
      a.click();
      URL.revokeObjectURL(url);
      
      alert('配置已导出！');
    }

    // 初始化
    newCharacter();
  </script>
</body>
</html>
